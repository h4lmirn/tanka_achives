name: 初回セットアップ（tanka.json → notes/ 一括生成）

on:
  workflow_dispatch:

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: tanka.jsonからnotesを一括生成（タグ付き）
        run: |
          python3 - << 'EOF'
          import json, re
          from pathlib import Path

          # ── キーワード辞書
          # キー = Obsidianタグ名, 値 = 本文にあればマッチする文字列リスト
          KEYWORD_DICT = {
              # 自然・天体
              "月":     ["月"],
              "海":     ["海"],
              "空":     ["空"],
              "星":     ["星"],
              "雨":     ["雨"],
              "雪":     ["雪"],
              "風":     ["風"],
              "光":     ["光", "ひかる", "ひかり"],
              "花":     ["花"],
              "夜":     ["夜", "よる"],
              "朝":     ["朝", "あさ"],
              "水":     ["水", "みず"],
              "火":     ["火", "炎", "ほのお"],
              "雲":     ["雲"],
              "波":     ["波"],
              # 身体
              "血":     ["血"],
              "涙":     ["涙", "なみだ"],
              "爪":     ["爪", "つめ", "爪先", "つまさき"],
              "髪":     ["髪"],
              "息":     ["息", "呼吸"],
              "手":     ["手", "指"],
              "目":     ["目", "瞳", "まなこ"],
              "口":     ["口", "唇", "くちびる"],
              "骨":     ["骨", "肋骨", "あばら"],
              "肌":     ["肌", "皮膚"],
              # 感情・観念
              "死":     ["死", "しぬ", "しんだ", "しにたい", "亡"],
              "夢":     ["夢", "ゆめ"],
              "愛":     ["愛"],
              "孤独":   ["孤独", "さびしさ", "さみしさ", "ひとり", "独り"],
              "嘘":     ["嘘", "うそ"],
              "痛":     ["痛", "いた"],
              # 動詞語幹
              "溶":     ["溶", "とけ", "とかす"],
              "燃":     ["燃", "もえ", "もやす"],
              "枯":     ["枯", "かれ"],
              "落":     ["落", "おち", "おとす"],
              "消":     ["消", "きえ", "けす"],
              "眠":     ["眠", "ねむ"],
              "焼":     ["焼", "やけ", "やく"],
              "切":     ["切", "きれ", "きる"],
              "飛":     ["飛", "とぶ", "とんで"],
              "沈":     ["沈", "しずむ"],
              "揺":     ["揺", "ゆれ"],
              "滲":     ["滲", "にじ"],
              # モチーフ
              "薬":     ["薬", "眠剤", "糖衣錠"],
              "刃":     ["刃", "剃刀", "包丁"],
              "鏡":     ["鏡"],
              "針":     ["針", "まち針"],
              "糸":     ["糸"],
              "布":     ["布団", "シーツ", "枕", "綿"],
              "煙草":   ["煙草", "タバコ", "たばこ", "ニコチン"],
              "ガラス": ["ガラス", "硝子"],
              "紙":     ["紙", "便箋", "書簡"],
          }

          def extract_tags(text):
              tags = []
              for tag, patterns in KEYWORD_DICT.items():
                  for p in patterns:
                      if p in text:
                          tags.append(tag)
                          break
              return tags

          with open("tanka.json", encoding="utf-8") as f:
              data = json.load(f)

          notes_dir = Path("notes")
          notes_dir.mkdir(exist_ok=True)

          for i, t in enumerate(data):
              text = t.get("text", "").strip()
              if not text:
                  continue

              date_val = t.get("date", "") or ""
              series = t.get("series", [])
              if isinstance(series, str):
                  series = [s.strip() for s in series.split(",") if s.strip()]
              kettei = t.get("kettei", False)
              tags = extract_tags(text)

              filename = notes_dir / f"{date_val}_{i:04d}.md"
              series_yaml = "[" + ", ".join(f'"{s}"' for s in series) + "]"
              tags_yaml = "[" + ", ".join(f'"{tag}"' for tag in tags) + "]"

              md = f"---\ndate: {date_val}\nseries: {series_yaml}\nkettei: {str(kettei).lower()}\ntags: {tags_yaml}\n---\n\n{text}\n"
              filename.write_text(md, encoding="utf-8")

          print(f"{len(data)}首のmdファイルを生成しました")
          EOF

      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/
          git commit -m "notes/ を再生成（キーワードタグ付き）"
          git push
