name: notes → tanka.json を再生成

on:
  push:
    paths:
      - 'notes/**'
    branches:
      - main

jobs:
  rebuild-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: mdからtanka.jsonを再生成
        run: |
          python3 - << 'EOF'
          import os, re, json
          from pathlib import Path

          notes_dir = Path("notes")
          if not notes_dir.exists():
              print("notes/ が存在しません")
              exit(0)

          tanka_list = []

          for md_file in sorted(notes_dir.glob("*.md")):
              content = md_file.read_text(encoding="utf-8")

              # frontmatter を分離
              fm_match = re.match(r'^---\n(.*?)\n---\n*(.*)', content, re.DOTALL)
              if not fm_match:
                  continue

              fm_raw = fm_match.group(1)
              body = fm_match.group(2).strip()

              if not body:
                  continue

              # date
              date_match = re.search(r'^date:\s*(.+)$', fm_raw, re.MULTILINE)
              date_val = date_match.group(1).strip() if date_match else ""

              # series（yaml配列 or 単一）
              series = []
              series_block = re.search(r'^series:\s*(.*?)(?=\n\w|\Z)', fm_raw, re.MULTILINE | re.DOTALL)
              if series_block:
                  sb = series_block.group(1)
                  items = re.findall(r'-\s*(.+)', sb)
                  series = [i.strip() for i in items if i.strip()]

              # kettei
              kettei_match = re.search(r'^kettei:\s*(.+)$', fm_raw, re.MULTILINE)
              kettei = kettei_match.group(1).strip().lower() == "true" if kettei_match else False

              tanka_list.append({
                  "text": body,
                  "date": date_val,
                  "series": series,
                  "kettei": kettei,
              })

          # 日付順にソート
          tanka_list.sort(key=lambda x: x["date"] or "")

          with open("tanka.json", "w", encoding="utf-8") as f:
              json.dump(tanka_list, f, ensure_ascii=False, indent=2)

          print(f"tanka.json を再生成しました（{len(tanka_list)}首）")
          EOF

      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tanka.json
          git diff --staged --quiet || git commit -m "tanka.json を notes/ から再生成"
          git push
