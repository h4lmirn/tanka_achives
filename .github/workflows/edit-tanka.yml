name: 短歌を編集する

on:
  workflow_dispatch:
    inputs:
      search:
        description: '対象の短歌（本文の一部を入力。1首だけにヒットするよう絞り込んでください）'
        required: true
        type: string
      new_text:
        description: '新しい本文（変更しない場合は空欄）'
        required: false
        type: string
      new_date:
        description: '新しい日付（例：2026-03-18）（変更しない場合は空欄）'
        required: false
        type: string
      new_series:
        description: '新しい連作名（カンマ区切り）（変更しない場合は空欄、削除する場合は「なし」）'
        required: false
        type: string

jobs:
  edit-tanka:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 短歌を編集
        env:
          SEARCH:     ${{ inputs.search }}
          NEW_TEXT:   ${{ inputs.new_text }}
          NEW_DATE:   ${{ inputs.new_date }}
          NEW_SERIES: ${{ inputs.new_series }}
        run: |
          python3 - << 'EOF'
          import json, os
          from pathlib import Path

          with open("tanka.json", encoding="utf-8") as f:
              data = json.load(f)

          search     = os.environ["SEARCH"].strip()
          new_text   = os.environ["NEW_TEXT"].strip()
          new_date   = os.environ["NEW_DATE"].strip()
          new_series = os.environ["NEW_SERIES"].strip()

          # ヒット数を確認
          hits = [(i, t) for i, t in enumerate(data) if search in t.get("text", "")]

          if len(hits) == 0:
              print(f"❌ 該当する短歌が見つかりませんでした。")
              print(f"   検索文字列: {search}")
              exit(1)

          if len(hits) > 1:
              print(f"❌ {len(hits)}首ヒットしました。もっと絞り込んでください。")
              print()
              for i, t in hits:
                  print(f"  [{i:04d}] {t['text']}")
              exit(1)

          idx, target = hits[0]
          print(f"✅ 対象: [{idx:04d}] {target['text']}")

          # 更新
          if new_text:
              target["text"] = new_text
          if new_date:
              target["date"] = new_date
          if new_series == "なし":
              target["series"] = []
          elif new_series:
              target["series"] = [s.strip() for s in new_series.split(",") if s.strip()]

          data[idx] = target

          with open("tanka.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          # notes/ の対応mdも更新
          notes_dir = Path("notes")
          if notes_dir.exists():
              for md_file in sorted(notes_dir.glob("*.md")):
                  stem = md_file.stem
                  parts = stem.rsplit("_", 1)
                  if len(parts) == 2 and parts[1].isdigit() and int(parts[1]) == idx:
                      date_val = target.get("date", "")
                      series = target.get("series", [])
                      if isinstance(series, str):
                          series = [s.strip() for s in series.split(",") if s.strip()]
                      kettei = target.get("kettei", False)
                      series_yaml = "[" + ", ".join(f'"{s}"' for s in series) + "]"
                      text = target["text"]
                      new_content = f"---\ndate: {date_val}\nseries: {series_yaml}\nkettei: {str(kettei).lower()}\ntags: []\n---\n\n{text}\n"
                      new_name = f"{date_val}_{idx:04d}.md" if date_val else md_file.name
                      new_path = notes_dir / new_name
                      if new_path != md_file:
                          md_file.unlink()
                      new_path.write_text(new_content, encoding="utf-8")
                      print(f"md更新: {new_path}")
                      break

          print(f"更新完了: {target['text']}")
          EOF

      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tanka.json notes/
          git diff --staged --quiet || git commit -m "短歌を編集: ${{ inputs.search }}"
          git push
