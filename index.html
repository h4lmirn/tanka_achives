<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短歌アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #0e0c0a;
  --bg2:       #181410;
  --paper:     #1e1a15;
  --ink:       #e8e0d0;
  --ink-faint: #8a7e6e;
  --ghost:     #3a3228;
  --accent:    #c8392b;
  --gold:      #c8a86e;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
}

/* 縦罫線の背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 79px,
    #ffffff04 79px,
    #ffffff04 80px
  );
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 2.5rem 2rem;
  border-bottom: 1px solid var(--ghost);
  display: flex;
  align-items: flex-end;
  gap: 1.5rem;
}

.header-vol {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .75rem;
  letter-spacing: .15em;
  color: var(--accent);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  padding-bottom: .2rem;
}

.header-main { flex: 1; }

h1 {
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 600;
  letter-spacing: .25em;
  line-height: 1.15;
  color: var(--ink);
  border-left: 3px solid var(--accent);
  padding-left: 1rem;
}

.header-sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .8rem;
  color: var(--ink-faint);
  margin-top: .5rem;
  padding-left: 1rem;
  letter-spacing: .1em;
}

/* ── CONTROLS ── */
.controls {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 1.2rem 2.5rem;
  border-bottom: 1px solid var(--ghost);
  display: flex;
  flex-direction: column;
  gap: .9rem;
}

.search-wrap input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  padding: .35rem 0;
  font-family: 'Noto Serif JP', serif;
  font-size: .85rem;
  color: var(--ink);
  outline: none;
  letter-spacing: .05em;
}
.search-wrap input::placeholder { color: var(--ghost); font-style: italic; }

.controls-row { display: flex; flex-wrap: wrap; gap: .4rem; align-items: center; }

.filter-label {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .7rem;
  letter-spacing: .12em;
  color: var(--ink-faint);
}

.pill {
  font-family: 'Noto Serif JP', serif;
  font-size: .68rem;
  letter-spacing: .06em;
  padding: .2rem .75rem;
  border: 1px solid var(--ghost);
  background: transparent;
  color: var(--ink-faint);
  cursor: pointer;
  transition: all .2s;
}
.pill:hover { border-color: var(--gold); color: var(--gold); }
.pill.active { background: var(--accent); border-color: var(--accent); color: var(--ink); }

.sort-wrap { margin-left: auto; display: flex; align-items: center; gap: .4rem; }
.sort-wrap label { font-family:'IM Fell English',serif; font-style:italic; font-size:.7rem; color:var(--ink-faint); letter-spacing:.1em; }
.sort-wrap select {
  font-family: 'Noto Serif JP', serif;
  font-size: .68rem;
  background: var(--paper);
  border: 1px solid var(--ghost);
  color: var(--ink);
  padding: .15rem .5rem;
  outline: none;
  appearance: none;
  cursor: pointer;
}

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 2.5rem 6rem;
}

.count {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .7rem;
  letter-spacing: .12em;
  color: var(--ink-faint);
  text-align: right;
  padding: 1.2rem 0 .4rem;
}

.tanka-list { list-style: none; }

.tanka-item {
  border-top: 1px solid var(--ghost);
  padding: 2.2rem 0 2.2rem 1.5rem;
  position: relative;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp .35s ease forwards;
}
.tanka-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 2.2rem;
  bottom: 2.2rem;
  width: 2px;
  background: var(--ghost);
  transition: background .2s;
}
.tanka-item:hover::before { background: var(--accent); }

@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.tanka-text {
  font-size: clamp(1rem, 2.3vw, 1.2rem);
  font-weight: 400;
  line-height: 2.2;
  letter-spacing: .12em;
  color: var(--ink);
  margin-bottom: 1rem;
  word-break: break-all;
}

.tanka-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .6rem;
}

.tanka-date {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .75rem;
  letter-spacing: .1em;
  color: var(--ink-faint);
}

.tanka-series {
  font-size: .65rem;
  letter-spacing: .08em;
  padding: .12rem .6rem;
  border: 1px solid var(--gold);
  color: var(--gold);
}

.tweet-link {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .65rem;
  letter-spacing: .08em;
  color: var(--ink-faint);
  text-decoration: none;
  margin-left: auto;
  transition: color .2s;
}
.tweet-link:hover { color: var(--accent); }

.empty {
  text-align: center;
  padding: 4rem 0;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .9rem;
  color: var(--ink-faint);
  letter-spacing: .1em;
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 1.5rem 2.5rem;
  border-top: 1px solid var(--ghost);
  display: flex;
  align-items: center;
  gap: 1rem;
}
.footer-rule { flex: 1; height: 1px; background: var(--ghost); }
footer a {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: .72rem;
  letter-spacing: .12em;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color .2s;
}
footer a:hover { color: var(--gold); }

@media (max-width:600px) {
  header,.controls,main,footer { padding-left:1.5rem; padding-right:1.5rem; }
  header { flex-direction:column; align-items:flex-start; gap:.75rem; }
  .header-vol { writing-mode:horizontal-tb; }
  .sort-wrap { margin-left:0; }
}
</style>
</head>
<body>

<header>
  <div class="header-vol">Tanka Archive</div>
  <div class="header-main">
    <!-- ↓ 名前を書き換えてください -->
    <h1 id="siteTitle">あなたの名前</h1>
    <p class="header-sub" id="siteSub"></p>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="短歌を検索する…">
  </div>
  <div class="controls-row">
    <span class="filter-label">連作 ·</span>
    <div id="pillContainer"></div>
    <div class="sort-wrap">
      <label for="sortSelect">sort</label>
      <select id="sortSelect">
        <option value="date-desc">新しい順</option>
        <option value="date-asc">古い順</option>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="count" id="countLabel"></div>
  <ul class="tanka-list" id="tankaList"></ul>
</main>

<!-- ↓ SNSリンクを書き換えるか、不要なら行ごと削除してください -->
<footer>
  <div class="footer-rule"></div>
  <a href="https://x.com/your_handle" target="_blank" rel="noopener">@your_handle</a>
  <div class="footer-rule"></div>
</footer>

<script>
// ═══════════════════════════════════════════════
// ここを書き換えてください
const CONFIG = {
  name:   "あなたの名前",
  sub:    "",
  xHandle: "your_handle",
  siteUrl: "",
};
// ═══════════════════════════════════════════════

document.getElementById('siteTitle').textContent = CONFIG.name;
document.title = CONFIG.name;
if (CONFIG.sub) document.getElementById('siteSub').textContent = CONFIG.sub;

let allTanka = [];
let activeFilter = "all";

function getSeries(t) {
  return Array.isArray(t.series) ? t.series : (t.series ? t.series.split(",").map(s=>s.trim()).filter(Boolean) : []);
}

function buildPills(data) {
  const set = new Set(data.flatMap(t => getSeries(t)));
  const c = document.getElementById('pillContainer');
  c.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pill' + (activeFilter==='all'?' active':'');
  all.textContent = 'すべて';
  all.onclick = () => { activeFilter='all'; render(); };
  c.appendChild(all);
  [...set].sort().forEach(s => {
    const p = document.createElement('button');
    p.className = 'pill' + (activeFilter===s?' active':'');
    p.textContent = s;
    p.onclick = () => { activeFilter=s; render(); };
    c.appendChild(p);
  });
}

function render() {
  const q = document.getElementById('searchInput').value.trim();
  const sort = document.getElementById('sortSelect').value;
  buildPills(allTanka);
  let filtered = allTanka.filter(t => {
    if (activeFilter !== 'all' && !getSeries(t).includes(activeFilter)) return false;
    if (q && !t.text.includes(q)) return false;
    return true;
  });
  filtered.sort((a,b) => {
    const da = new Date(a.date||'1900-01-01'), db = new Date(b.date||'1900-01-01');
    return sort==='date-asc' ? da-db : db-da;
  });
  const list = document.getElementById('tankaList');
  list.innerHTML = '';
  document.getElementById('countLabel').textContent = filtered.length + ' 首';
  if (!filtered.length) { list.innerHTML = '<li class="empty">— 該当する短歌がありません —</li>'; return; }
  filtered.forEach((t,i) => {
    const li = document.createElement('li');
    li.className = 'tanka-item';
    li.style.animationDelay = Math.min(i*35,400)+'ms';
    const d = t.date ? new Date(t.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '';
    const tweetText = encodeURIComponent(t.text + '\n' + CONFIG.name + (CONFIG.siteUrl ? '\n'+CONFIG.siteUrl : ''));
    li.innerHTML = `
      <div class="tanka-text">${t.text}</div>
      <div class="tanka-meta">
        ${d ? `<span class="tanka-date">${d}</span>` : ''}
        ${getSeries(t).map(s=>`<span class="tanka-series">${s}</span>`).join('')}
        <a class="tweet-link" href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" rel="noopener">ポスト</a>
      </div>`;
    list.appendChild(li);
  });
}

fetch('tanka.json').then(r=>r.json()).then(d=>{allTanka=d;render();}).catch(()=>{
  document.getElementById('tankaList').innerHTML='<li class="empty">— tanka.json が見つかりません —</li>';
});
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('sortSelect').addEventListener('change', render);
</script>
</body>
</html>
