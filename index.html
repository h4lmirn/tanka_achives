<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短歌アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600&family=Lora:ital,wght@0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7fb;
  --bg2:#f3eef6;
  --ink:#2e2430;
  --ink-faint:#9080a0;
  --ghost:#ddd0e8;
  --rose:#c8809a;
  --mauve:#b090c0;
  --blush:#f0d8e8;
  --sage:#9ab0a0;
}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Zen Old Mincho',serif;
  min-height:100vh;
}

/* 霞のグラデーション */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 0% 0%,#f0d0e844 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,#d8e8f044 0%,transparent 50%),
    radial-gradient(ellipse at 60% 20%,#e8d8f033 0%,transparent 40%);
  pointer-events:none;z-index:0;
  animation:haze 20s ease-in-out infinite alternate;
}
@keyframes haze{
  from{opacity:.6}to{opacity:1}
}

header{
  position:relative;z-index:1;
  max-width:680px;margin:0 auto;
  padding:5rem 2.5rem 2.5rem;
  text-align:center;
}

.header-petal{
  font-family:'Lora',serif;font-style:italic;
  font-size:.65rem;letter-spacing:.3em;
  color:var(--rose);margin-bottom:1.5rem;
  opacity:.7;
}

h1{
  font-size:clamp(1.8rem,4.5vw,2.8rem);
  font-weight:600;letter-spacing:.25em;
  line-height:1.2;color:var(--ink);
}

.header-sub{
  font-family:'Lora',serif;font-style:italic;
  font-size:.78rem;color:var(--ink-faint);
  margin-top:.6rem;letter-spacing:.1em;
}

.header-divider{
  margin:1.8rem auto 0;
  width:60px;height:1px;
  background:linear-gradient(to right,transparent,var(--rose),transparent);
}

.controls{
  position:relative;z-index:1;
  max-width:680px;margin:0 auto;
  padding:1.2rem 2.5rem;
  display:flex;flex-direction:column;gap:.8rem;
}

.search-wrap input{
  width:100%;
  background:rgba(255,255,255,.6);
  border:1px solid var(--ghost);
  border-radius:2rem;
  padding:.45rem 1.2rem;
  font-family:'Zen Old Mincho',serif;font-size:.85rem;
  color:var(--ink);outline:none;letter-spacing:.04em;
  backdrop-filter:blur(4px);
  transition:border-color .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:var(--rose);box-shadow:0 0 0 3px #c8809a18}
.search-wrap input::placeholder{color:var(--ghost)}

.controls-row{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;justify-content:center}

.filter-label{font-family:'Lora',serif;font-style:italic;font-size:.68rem;letter-spacing:.15em;color:var(--ink-faint)}

.pill{
  font-family:'Zen Old Mincho',serif;font-size:.68rem;
  letter-spacing:.06em;padding:.2rem .8rem;
  border:1px solid var(--ghost);
  background:rgba(255,255,255,.4);
  color:var(--ink-faint);border-radius:2rem;
  cursor:pointer;transition:all .2s;
  backdrop-filter:blur(2px);
}
.pill:hover{border-color:var(--rose);color:var(--rose)}
.pill.active{background:linear-gradient(135deg,var(--rose),var(--mauve));border-color:transparent;color:#fff}

.sort-wrap{display:flex;align-items:center;gap:.4rem}
.sort-wrap label{font-family:'Lora',serif;font-style:italic;font-size:.68rem;color:var(--ink-faint);letter-spacing:.1em}
.sort-wrap select{font-family:'Zen Old Mincho',serif;font-size:.68rem;background:rgba(255,255,255,.6);border:1px solid var(--ghost);border-radius:1rem;color:var(--ink);padding:.15rem .6rem;outline:none;appearance:none;cursor:pointer;backdrop-filter:blur(2px)}

main{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 2.5rem 6rem}

.count{font-family:'Lora',serif;font-style:italic;font-size:.68rem;letter-spacing:.12em;color:var(--ink-faint);text-align:center;padding:1.2rem 0 .4rem}

.tanka-list{list-style:none}

.tanka-item{
  background:rgba(255,255,255,.45);
  border:1px solid rgba(200,170,220,.3);
  border-radius:.75rem;
  padding:2rem 2rem 1.5rem;
  margin-bottom:.9rem;
  backdrop-filter:blur(6px);
  opacity:0;transform:translateY(8px);
  animation:fadeUp .4s ease forwards;
  transition:border-color .2s,box-shadow .2s;
}
.tanka-item:hover{border-color:rgba(200,128,154,.4);box-shadow:0 4px 24px #c8809a12}

@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

.tanka-text{
  font-size:clamp(1rem,2.3vw,1.15rem);
  font-weight:400;line-height:2.2;
  letter-spacing:.1em;color:var(--ink);
  margin-bottom:1rem;word-break:break-all;
}

.tanka-meta{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem}
.tanka-date{font-family:'Lora',serif;font-style:italic;font-size:.72rem;letter-spacing:.1em;color:var(--ink-faint)}
.tanka-series{font-size:.65rem;letter-spacing:.08em;padding:.12rem .65rem;border-radius:2rem;border:1px solid var(--rose);color:var(--rose);background:#c8809a0a}
.tweet-link{font-family:'Lora',serif;font-style:italic;font-size:.62rem;letter-spacing:.1em;color:var(--ghost);text-decoration:none;margin-left:auto;transition:color .2s}
.tweet-link:hover{color:var(--rose)}

.empty{text-align:center;padding:4rem 0;font-family:'Lora',serif;font-style:italic;font-size:.9rem;color:var(--ink-faint);letter-spacing:.1em}

footer{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:2rem 2.5rem;text-align:center}
footer a{font-family:'Lora',serif;font-style:italic;font-size:.7rem;letter-spacing:.15em;color:var(--ink-faint);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--rose)}

@media(max-width:600px){header,.controls,main,footer{padding-left:1.25rem;padding-right:1.25rem}.sort-wrap{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="header-petal">✦ tanka archive ✦</div>
  <h1 id="siteTitle">あなたの名前</h1>
  <p class="header-sub" id="siteSub"></p>
  <div class="header-divider"></div>
</header>
<div class="controls">
  <div class="search-wrap"><input type="text" id="searchInput" placeholder="短歌を検索する…"></div>
  <div class="controls-row">
    <span class="filter-label">連作 ·</span>
    <div id="pillContainer"></div>
    <div class="sort-wrap">
      <label for="sortSelect">sort</label>
      <select id="sortSelect"><option value="date-desc">新しい順</option><option value="date-asc">古い順</option></select>
    </div>
  </div>
</div>
<main><div class="count" id="countLabel"></div><ul class="tanka-list" id="tankaList"></ul></main>
<footer><a href="https://x.com/your_handle" target="_blank" rel="noopener" id="footerLink">@your_handle</a></footer>
<script>
const CONFIG={name:"あなたの名前",sub:"",xHandle:"your_handle",siteUrl:""};
document.getElementById('siteTitle').textContent=CONFIG.name;
document.title=CONFIG.name;
if(CONFIG.sub)document.getElementById('siteSub').textContent=CONFIG.sub;
document.getElementById('footerLink').textContent='@'+CONFIG.xHandle;
document.getElementById('footerLink').href='https://x.com/'+CONFIG.xHandle;
let allTanka=[],activeFilter="all";
function getSeries(t){return Array.isArray(t.series)?t.series:(t.series?t.series.split(",").map(s=>s.trim()).filter(Boolean):[])}
function buildPills(data){
  const set=new Set(data.flatMap(t=>getSeries(t)));
  const c=document.getElementById('pillContainer');c.innerHTML='';
  const all=document.createElement('button');all.className='pill'+(activeFilter==='all'?' active':'');all.textContent='すべて';all.onclick=()=>{activeFilter='all';render()};c.appendChild(all);
  [...set].sort().forEach(s=>{const p=document.createElement('button');p.className='pill'+(activeFilter===s?' active':'');p.textContent=s;p.onclick=()=>{activeFilter=s;render()};c.appendChild(p)});
}
function render(){
  const q=document.getElementById('searchInput').value.trim();const sort=document.getElementById('sortSelect').value;
  buildPills(allTanka);
  let filtered=allTanka.filter(t=>{if(activeFilter!=='all'&&!getSeries(t).includes(activeFilter))return false;if(q&&!t.text.includes(q))return false;return true});
  filtered.sort((a,b)=>{const da=new Date(a.date||'1900-01-01'),db=new Date(b.date||'1900-01-01');return sort==='date-asc'?da-db:db-da});
  const list=document.getElementById('tankaList');list.innerHTML='';
  document.getElementById('countLabel').textContent=filtered.length+' 首';
  if(!filtered.length){list.innerHTML='<li class="empty">— 該当する短歌がありません —</li>';return}
  filtered.forEach((t,i)=>{
    const li=document.createElement('li');li.className='tanka-item';li.style.animationDelay=Math.min(i*35,400)+'ms';
    const d=t.date?new Date(t.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}):'';
    const tweetText=encodeURIComponent(t.text+'\n'+CONFIG.name+(CONFIG.siteUrl?'\n'+CONFIG.siteUrl:''));
    li.innerHTML=`<div class="tanka-text">${t.text}</div><div class="tanka-meta">${d?`<span class="tanka-date">${d}</span>`:''}${getSeries(t).map(s=>`<span class="tanka-series">${s}</span>`).join('')}<a class="tweet-link" href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" rel="noopener">ポスト</a></div>`;
    list.appendChild(li);
  });
}
fetch('tanka.json').then(r=>r.json()).then(d=>{allTanka=d;render()}).catch(()=>{document.getElementById('tankaList').innerHTML='<li class="empty">— tanka.json が見つかりません —</li>'});
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('sortSelect').addEventListener('change',render);
</script>
</body>
</html>
