<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短歌アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══ CONFIG ═══════════════════════════════════════════
   ここを書き換えてください
   ════════════════════════════════════════════════════ */

:root {
  --bg:        #fdf6ff;
  --bg2:       #f5e9ff;
  --ink:       #3d2450;
  --ink-faint: #9b7ab0;
  --ghost:     #ddc9f0;
  --accent:    #c084e8;
  --accent2:   #f0a8c8;
  --star:      #e8b4f0;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 10%, #f5d9ff44 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, #ffd9ec44 0%, transparent 50%);
  color: var(--ink);
  font-family: 'Kaisei Decol', serif;
  min-height: 100vh;
}

/* ── 散りばめた星 ── */
body::before {
  content: '✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧';
  position: fixed;
  top: 0; left: 0; right: 0;
  font-size: .55rem;
  letter-spacing: .6rem;
  color: var(--star);
  opacity: .5;
  padding: .4rem 1rem;
  pointer-events: none;
  z-index: 0;
  white-space: nowrap;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 4rem 2rem 2rem;
  max-width: 680px;
  margin: 0 auto;
}

.header-deco {
  font-size: .65rem;
  letter-spacing: .3em;
  color: var(--accent2);
  margin-bottom: .9rem;
}

h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: .15em;
  line-height: 1.2;
}

.header-sub {
  margin-top: .7rem;
  font-size: .8rem;
  color: var(--ink-faint);
  letter-spacing: .12em;
}

/* ── CONTROLS ── */
.controls {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 1.5rem auto 0;
  padding: 1.2rem 2rem;
  background: #fff8;
  border: 1px solid var(--ghost);
  border-radius: 1.5rem;
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  gap: .9rem;
}

.search-wrap input {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--ghost);
  border-radius: 2rem;
  padding: .45rem 1.2rem;
  font-family: 'Kaisei Decol', serif;
  font-size: .85rem;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--ghost); }

.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
  align-items: center;
}

.filter-label {
  font-size: .68rem;
  letter-spacing: .12em;
  color: var(--ink-faint);
}

.pill {
  font-family: 'Kaisei Decol', serif;
  font-size: .68rem;
  letter-spacing: .06em;
  padding: .2rem .8rem;
  border: 1.5px solid var(--ghost);
  background: transparent;
  color: var(--ink-faint);
  border-radius: 2rem;
  cursor: pointer;
  transition: all .2s;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: #fff; }

.sort-wrap { margin-left: auto; display: flex; align-items: center; gap: .4rem; }
.sort-wrap label { font-size: .68rem; color: var(--ink-faint); letter-spacing: .08em; }
.sort-wrap select {
  font-family: 'Kaisei Decol', serif;
  font-size: .68rem;
  background: var(--bg2);
  border: 1.5px solid var(--ghost);
  border-radius: 1rem;
  color: var(--ink);
  padding: .15rem .5rem;
  outline: none;
  appearance: none;
  cursor: pointer;
}

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 2rem 6rem;
}

.count {
  font-size: .68rem;
  letter-spacing: .12em;
  color: var(--ink-faint);
  text-align: right;
  padding: 1.2rem 0 .4rem;
}

.tanka-list { list-style: none; }

.tanka-item {
  background: #fff8;
  border: 1.5px solid var(--ghost);
  border-radius: 1.2rem;
  padding: 1.8rem 1.8rem 1.4rem;
  margin-bottom: 1rem;
  backdrop-filter: blur(4px);
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp .35s ease forwards;
  transition: border-color .2s, box-shadow .2s;
}
.tanka-item:hover {
  border-color: var(--accent2);
  box-shadow: 0 4px 20px #c084e815;
}

@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.tanka-text {
  font-size: clamp(1rem, 2.4vw, 1.2rem);
  font-weight: 500;
  line-height: 2.1;
  letter-spacing: .1em;
  color: var(--ink);
  margin-bottom: 1rem;
  word-break: break-all;
}

.tanka-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .5rem;
}

.tanka-date {
  font-size: .72rem;
  letter-spacing: .08em;
  color: var(--ink-faint);
}

.tanka-series {
  font-size: .66rem;
  letter-spacing: .08em;
  padding: .12rem .6rem;
  border-radius: 1rem;
  background: var(--bg2);
  border: 1px solid var(--accent);
  color: var(--accent);
}

.tweet-link {
  font-size: .62rem;
  letter-spacing: .08em;
  color: var(--ink-faint);
  text-decoration: none;
  margin-left: auto;
  transition: color .2s;
}
.tweet-link:hover { color: var(--accent); }

.empty {
  text-align: center;
  padding: 4rem 0;
  font-size: .9rem;
  color: var(--ink-faint);
  letter-spacing: .1em;
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  font-size: .7rem;
  letter-spacing: .12em;
  color: var(--ghost);
}
footer a {
  color: var(--accent2);
  text-decoration: none;
  transition: color .2s;
}
footer a:hover { color: var(--accent); }

@media (max-width:600px) {
  header,.controls,main { padding-left:1.2rem; padding-right:1.2rem; }
  .controls { border-radius:1rem; }
  .sort-wrap { margin-left:0; }
}
</style>
</head>
<body>

<header>
  <div class="header-deco">✦ tanka archive ✦</div>
  <!-- ↓ 名前を書き換えてください -->
  <h1 id="siteTitle">あなたの名前</h1>
  <p class="header-sub" id="siteSub"></p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="短歌を検索する…">
  </div>
  <div class="controls-row">
    <span class="filter-label">連作 ·</span>
    <div id="pillContainer"></div>
    <div class="sort-wrap">
      <label for="sortSelect">並べ替え</label>
      <select id="sortSelect">
        <option value="date-desc">新しい順</option>
        <option value="date-asc">古い順</option>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="count" id="countLabel"></div>
  <ul class="tanka-list" id="tankaList"></ul>
</main>

<!-- ↓ SNSリンクを書き換えるか、不要なら行ごと削除してください -->
<footer>
  <a href="https://x.com/your_handle" target="_blank" rel="noopener">@your_handle</a>
</footer>

<script>
// ═══════════════════════════════════════════════
// ここを書き換えてください
const CONFIG = {
  name:   "あなたの名前",   // サイトタイトル
  sub:    "",               // サブタイトル（不要なら空白）
  xHandle: "your_handle",   // Xのハンドル（不要なら空文字 "" にしてください）
  siteUrl: "",              // サイトのURL（ポストリンクに使います）
};
// ═══════════════════════════════════════════════

document.getElementById('siteTitle').textContent = CONFIG.name;
document.title = CONFIG.name;
if (CONFIG.sub) document.getElementById('siteSub').textContent = CONFIG.sub;

let allTanka = [];
let activeFilter = "all";

function getSeries(t) {
  return Array.isArray(t.series) ? t.series : (t.series ? t.series.split(",").map(s=>s.trim()).filter(Boolean) : []);
}

function buildPills(data) {
  const set = new Set(data.flatMap(t => getSeries(t)));
  const c = document.getElementById('pillContainer');
  c.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pill' + (activeFilter==='all'?' active':'');
  all.textContent = 'すべて';
  all.onclick = () => { activeFilter='all'; render(); };
  c.appendChild(all);
  [...set].sort().forEach(s => {
    const p = document.createElement('button');
    p.className = 'pill' + (activeFilter===s?' active':'');
    p.textContent = s;
    p.onclick = () => { activeFilter=s; render(); };
    c.appendChild(p);
  });
}

function render() {
  const q = document.getElementById('searchInput').value.trim();
  const sort = document.getElementById('sortSelect').value;
  buildPills(allTanka);
  let filtered = allTanka.filter(t => {
    if (activeFilter !== 'all' && !getSeries(t).includes(activeFilter)) return false;
    if (q && !t.text.includes(q)) return false;
    return true;
  });
  filtered.sort((a,b) => {
    const da = new Date(a.date||'1900-01-01'), db = new Date(b.date||'1900-01-01');
    return sort==='date-asc' ? da-db : db-da;
  });
  const list = document.getElementById('tankaList');
  list.innerHTML = '';
  document.getElementById('countLabel').textContent = filtered.length + ' 首';
  if (!filtered.length) { list.innerHTML = '<li class="empty">— 該当する短歌がありません —</li>'; return; }
  filtered.forEach((t,i) => {
    const li = document.createElement('li');
    li.className = 'tanka-item';
    li.style.animationDelay = Math.min(i*35,400)+'ms';
    const d = t.date ? new Date(t.date).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '';
    const tweetText = encodeURIComponent(t.text + '\n' + CONFIG.name + (CONFIG.siteUrl ? '\n'+CONFIG.siteUrl : ''));
    li.innerHTML = `
      <div class="tanka-text">${t.text}</div>
      <div class="tanka-meta">
        ${d ? `<span class="tanka-date">${d}</span>` : ''}
        ${getSeries(t).map(s=>`<span class="tanka-series">${s}</span>`).join('')}
        <a class="tweet-link" href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" rel="noopener">ポスト</a>
      </div>`;
    list.appendChild(li);
  });
}

fetch('tanka.json').then(r=>r.json()).then(d=>{allTanka=d;render();}).catch(()=>{
  document.getElementById('tankaList').innerHTML='<li class="empty">— tanka.json が見つかりません —</li>';
});
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('sortSelect').addEventListener('change', render);
</script>
</body>
</html>
